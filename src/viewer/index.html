<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkStacean Event Log</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: #0d1117;
    color: #c9d1d9;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #58a6ff;
  }

  .tabs {
    display: flex;
    gap: 2px;
    background: #0d1117;
    border-radius: 6px;
    padding: 2px;
  }

  .tab {
    padding: 4px 14px;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    color: #8b949e;
    border: none;
    background: transparent;
    font-family: inherit;
    transition: all 0.15s;
  }

  .tab:hover { color: #c9d1d9; }
  .tab.active { background: #21262d; color: #c9d1d9; }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    background: #21262d;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #f85149;
    transition: background 0.2s;
  }

  .status-dot.connected { background: #3fb950; }
  .status-dot.connecting { background: #d29922; animation: pulse 1s infinite; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .badge {
    font-size: 11px;
    background: #30363d;
    padding: 2px 8px;
    border-radius: 10px;
    color: #8b949e;
  }

  .toolbar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 8px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .toolbar input {
    background: #0d1117;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 6px 10px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    width: 260px;
    outline: none;
  }

  .toolbar input:focus { border-color: #58a6ff; }
  .toolbar input::placeholder { color: #484f58; }

  .toolbar button {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 6px 12px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .toolbar button:hover { background: #30363d; }

  .event-list {
    flex: 1;
    overflow: auto;
    padding: 8px 0;
  }

  .event-list::-webkit-scrollbar { width: 8px; }
  .event-list::-webkit-scrollbar-track { background: #0d1117; }
  .event-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

  .event-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid #21262d;
    cursor: pointer;
    transition: background 0.1s;
    overflow-x: auto;
  }

  .event-row::-webkit-scrollbar { height: 4px; }
  .event-row::-webkit-scrollbar-track { background: transparent; }
  .event-row::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

  .event-row:hover { background: #161b22; }

  .event-time {
    font-size: 11px;
    color: #484f58;
    white-space: nowrap;
    min-width: 70px;
    padding-top: 2px;
  }

  .event-topic {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .event-topic.source-agent { background: #1a1932; color: #bc8cff; }
  .event-topic.source-cli { background: #122d20; color: #3fb950; }
  .event-topic.source-signal { background: #2d1f12; color: #d29922; }
  .event-topic.source-echo { background: #1f2330; color: #79c0ff; }
  .event-topic.source-scheduler { background: #2d1229; color: #f778ba; }
  .event-topic.source-logger { background: #1a2332; color: #58a6ff; }
  .event-topic.source-event-viewer { background: #2d2a12; color: #e3b341; }
  .event-topic.source-default { background: #21262d; color: #8b949e; }

  .event-preview {
    font-size: 12px;
    color: #8b949e;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .event-detail {
    display: none;
    padding: 0 16px 12px 98px;
    background: #0d1117;
    border-bottom: 1px solid #21262d;
  }

  .event-detail.open { display: block; }

  .event-detail pre {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
    font-size: 12px;
    overflow: auto;
    max-height: 400px;
    color: #c9d1d9;
    line-height: 1.5;
  }

  /* Log rows */
  .log-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 4px 16px;
    border-bottom: 1px solid #161b22;
    cursor: pointer;
    transition: background 0.1s;
    overflow-x: auto;
  }

  .log-row::-webkit-scrollbar { height: 4px; }
  .log-row::-webkit-scrollbar-track { background: transparent; }
  .log-row::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

  .log-row:hover { background: #161b22; }

  .log-level {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
    font-weight: 600;
    text-transform: uppercase;
    min-width: 44px;
    text-align: center;
  }

  .log-level.log { background: #21262d; color: #8b949e; }
  .log-level.debug { background: #1a2332; color: #58a6ff; }
  .log-level.info { background: #122d20; color: #3fb950; }
  .log-level.warn { background: #2d1f12; color: #d29922; }
  .log-level.error { background: #2d1215; color: #f85149; }

  .log-message {
    font-size: 12px;
    color: #6e7681;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .log-detail {
    display: none;
    padding: 0 16px 12px 98px;
    background: #0d1117;
    border-bottom: 1px solid #161b22;
  }

  .log-detail.open { display: block; }

  .log-detail pre {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
    font-size: 12px;
    overflow: auto;
    max-height: 400px;
    color: #c9d1d9;
    line-height: 1.5;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #484f58;
    gap: 8px;
  }

  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <h1>WorkStacean Event Log</h1>
  <div class="tabs">
    <button class="tab active" data-tab="events">Events</button>
    <button class="tab" data-tab="logs">Logs</button>
  </div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Disconnected</span>
  </div>
  <div class="badge" id="itemCount">0 events</div>
</div>

<div class="toolbar">
  <input type="text" id="filterInput" placeholder="Filter by topic (e.g. agent.*)">
  <button id="clearBtn">Clear</button>
  <button id="pauseBtn">Pause</button>
  <button id="autoScrollBtn" title="Auto-scroll">Auto-scroll</button>
</div>

<div class="event-list" id="list">
  <div class="empty-state" id="emptyState">
    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path d="M3 12h1m8-9v1m8 8h1M5.6 5.6l.7.7m12.1-.7l-.7.7M8 16a4 4 0 108 0 4 4 0 00-8 0z"/>
    </svg>
    <p>Waiting for events...</p>
  </div>
</div>

<script>
(function() {
  const list = document.getElementById("list");
  const statusDot = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");
  const itemCount = document.getElementById("itemCount");
  const filterInput = document.getElementById("filterInput");
  const clearBtn = document.getElementById("clearBtn");
  const pauseBtn = document.getElementById("pauseBtn");
  const autoScrollBtn = document.getElementById("autoScrollBtn");
  const emptyState = document.getElementById("emptyState");
  const tabs = document.querySelectorAll(".tab");

  let events = [];
  let logs = [];
  let paused = false;
  let autoScroll = true;
  let ws = null;
  let reconnectDelay = 1000;
  let openDetailId = null;
  let activeTab = "events";

  autoScrollBtn.style.background = "#1f6feb";
  autoScrollBtn.style.borderColor = "#1f6feb";

  function getSource(topic) {
    if (!topic) return "default";
    return topic.split(".")[0].toLowerCase();
  }

  function formatTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString("en-US", { hour12: false });
  }

  function compressTopic(topic) {
    if (!topic) return "";
    return topic.split(".").map(p => p[0]).join(".");
  }

  function formatPayload(msg) {
    if (typeof msg.payload === "string") return msg.payload;
    if (msg.payload?.content) return msg.payload.content;
    return JSON.stringify(msg.payload, null, 2);
  }

  function topicMatchesFilter(topic, filter) {
    if (!filter) return true;
    const parts = filter.split(".");
    const topicParts = (topic || "").split(".");
    for (let i = 0; i < parts.length; i++) {
      if (parts[i] === "*") continue;
      if (parts[i] === "#") return true;
      if (parts[i] !== topicParts[i]) return false;
    }
    return parts.length === topicParts.length;
  }

  function isDebug(msg) {
    return msg.topic && msg.topic.startsWith("debug.");
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  /* --- Render event row --- */
  function renderEventRow(msg) {
    const source = getSource(msg.topic);
    const row = document.createElement("div");
    row.className = "event-row";
    row.dataset.id = msg.id;

    row.innerHTML = `
      <span class="event-time">${formatTime(msg.timestamp)}</span>
      <span class="event-topic source-${source}" title="${escapeHtml(msg.topic)}">${compressTopic(msg.topic)}</span>
      <span class="event-preview">${escapeHtml(formatPayload(msg))}</span>
    `;

    const detail = document.createElement("div");
    detail.className = "event-detail";
    detail.dataset.id = msg.id;
    detail.innerHTML = `<pre>${escapeHtml(JSON.stringify(msg, null, 2))}</pre>`;

    row.addEventListener("click", () => {
      if (openDetailId === msg.id) {
        detail.classList.remove("open");
        openDetailId = null;
      } else {
        list.querySelectorAll(".event-detail.open, .log-detail.open").forEach(d => d.classList.remove("open"));
        detail.classList.add("open");
        openDetailId = msg.id;
      }
    });

    list.appendChild(row);
    list.appendChild(detail);
  }

  /* --- Render log row --- */
  function renderLogRow(msg) {
    const level = (msg.payload?.level || "log").toLowerCase();
    const message = msg.payload?.message || "";

    const row = document.createElement("div");
    row.className = "log-row";
    row.dataset.id = msg.id;

    row.innerHTML = `
      <span class="event-time">${formatTime(msg.timestamp)}</span>
      <span class="log-level ${level}">${level}</span>
      <span class="log-message">${escapeHtml(message)}</span>
    `;

    const detail = document.createElement("div");
    detail.className = "log-detail";
    detail.dataset.id = msg.id;
    detail.innerHTML = `<pre>${escapeHtml(JSON.stringify(msg.payload, null, 2))}</pre>`;

    row.addEventListener("click", () => {
      if (openDetailId === msg.id) {
        detail.classList.remove("open");
        openDetailId = null;
      } else {
        list.querySelectorAll(".event-detail.open, .log-detail.open").forEach(d => d.classList.remove("open"));
        detail.classList.add("open");
        openDetailId = msg.id;
      }
    });

    list.appendChild(row);
    list.appendChild(detail);
  }

  /* --- Render a message (routes to event or log) --- */
  function renderMessage(msg) {
    if (isDebug(msg)) {
      renderLogRow(msg);
    } else {
      renderEventRow(msg);
    }
  }

  /* --- Rebuild visible list from data --- */
  function rebuildList() {
    list.querySelectorAll(".event-row, .event-detail, .log-row, .log-detail").forEach(el => el.remove());

    const items = activeTab === "events" ? events : logs;
    const filter = filterInput.value.trim();

    if (items.length === 0) {
      emptyState.style.display = "";
      return;
    }

    emptyState.style.display = "none";

    for (const msg of items) {
      if (filter && !topicMatchesFilter(msg.topic, filter)) continue;
      renderMessage(msg);
    }

    if (autoScroll) {
      list.scrollTop = list.scrollHeight;
    }
  }

  function updateCount() {
    const items = activeTab === "events" ? events : logs;
    const filter = filterInput.value.trim();
    const visible = filter ? items.filter(e => topicMatchesFilter(e.topic, filter)).length : items.length;
    const label = activeTab === "events" ? "events" : "logs";
    itemCount.textContent = `${visible} ${label}`;
  }

  function applyFilter() {
    rebuildList();
    updateCount();
  }

  function setStatus(state) {
    statusDot.className = "status-dot";
    if (state === "connected") {
      statusDot.classList.add("connected");
      statusText.textContent = "Connected";
    } else if (state === "connecting") {
      statusDot.classList.add("connecting");
      statusText.textContent = "Connecting...";
    } else {
      statusText.textContent = "Disconnected";
    }
  }

  async function loadHistory() {
    try {
      const res = await fetch("/api/events?limit=500");
      if (!res.ok) return;
      const data = await res.json();
      data.reverse().forEach(msg => {
        if (isDebug(msg)) {
          logs.push(msg);
        } else {
          events.push(msg);
        }
      });
      rebuildList();
      updateCount();
    } catch (e) {
      console.warn("Failed to load history:", e);
    }
  }

  function connect() {
    setStatus("connecting");
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onopen = () => {
      setStatus("connected");
      reconnectDelay = 1000;
    };

    ws.onmessage = (evt) => {
      if (paused) return;
      try {
        const msg = JSON.parse(evt.data);
        if (isDebug(msg)) {
          logs.push(msg);
        } else {
          events.push(msg);
        }
        if (emptyState.style.display !== "none") emptyState.style.display = "none";

        if (activeTab === "events" && !isDebug(msg)) {
          const filter = filterInput.value.trim();
          if (!filter || topicMatchesFilter(msg.topic, filter)) {
            renderMessage(msg);
            if (autoScroll) list.scrollTop = list.scrollHeight;
          }
        } else if (activeTab === "logs" && isDebug(msg)) {
          const filter = filterInput.value.trim();
          if (!filter || topicMatchesFilter(msg.topic, filter)) {
            renderMessage(msg);
            if (autoScroll) list.scrollTop = list.scrollHeight;
          }
        }
        updateCount();
      } catch (e) {
        console.warn("Failed to parse event:", e);
      }
    };

    ws.onclose = () => {
      setStatus("disconnected");
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 2, 15000);
    };

    ws.onerror = () => {
      ws.close();
    };
  }

  /* --- Tabs --- */
  tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      tabs.forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      activeTab = tab.dataset.tab;
      openDetailId = null;
      filterInput.placeholder = activeTab === "events"
        ? "Filter by topic (e.g. agent.*)"
        : "Filter by topic (e.g. debug.*)";
      rebuildList();
      updateCount();
    });
  });

  clearBtn.addEventListener("click", () => {
    if (activeTab === "events") {
      events = [];
    } else {
      logs = [];
    }
    openDetailId = null;
    rebuildList();
    updateCount();
  });

  pauseBtn.addEventListener("click", () => {
    paused = !paused;
    pauseBtn.textContent = paused ? "Resume" : "Pause";
    pauseBtn.style.background = paused ? "#da3633" : "";
    pauseBtn.style.borderColor = paused ? "#da3633" : "";
  });

  autoScrollBtn.addEventListener("click", () => {
    autoScroll = !autoScroll;
    autoScrollBtn.style.background = autoScroll ? "#1f6feb" : "";
    autoScrollBtn.style.borderColor = autoScroll ? "#1f6feb" : "";
  });

  filterInput.addEventListener("input", applyFilter);

  list.addEventListener("scroll", () => {
    const atBottom = list.scrollHeight - list.scrollTop - list.clientHeight < 50;
    if (atBottom && !autoScroll) {
      autoScroll = true;
      autoScrollBtn.style.background = "#1f6feb";
      autoScrollBtn.style.borderColor = "#1f6feb";
    } else if (!atBottom && autoScroll) {
      autoScroll = false;
      autoScrollBtn.style.background = "";
      autoScrollBtn.style.borderColor = "";
    }
  });

  loadHistory();
  connect();
})();
</script>
</body>
</html>
